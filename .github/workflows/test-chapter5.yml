name: E2E tests (library)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install library-backend dependencies
        working-directory: library-backend
        run: npm ci

      - name: Install library-frontend dependencies
        working-directory: library-frontend
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: tests-chapter5
        run: npm ci

      # Pre-install system dependencies safely at the root runner level
      - name: Install system dependencies for Playwright
        run: npx playwright install-deps chromium

      # Install the actual browser with the non-interactive flag tied to your path
      - name: Install Playwright Chromium
        working-directory: tests-chapter5
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests-chapter5
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true
        run: npx playwright test --reporter=list
