name: E2E tests (library)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install library-backend dependencies
        working-directory: library-backend
        run: npm ci

      - name: Install library-frontend dependencies
        working-directory: library-frontend
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: tests-chapter5
        run: npm ci

      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: /tmp/mongodb-binaries
          key: mongodb-binary-7.0.14

      - name: Download MongoDB binary
        working-directory: tests-chapter5
        env:
          MONGOMS_VERSION: 7.0.14
          MONGOMS_DOWNLOAD_DIR: /tmp/mongodb-binaries
        run: node -e "const { MongoMemoryServer } = require('mongodb-memory-server'); MongoMemoryServer.create().then(s => { console.log('MongoDB ready'); s.stop(); })"

      - name: Run Playwright tests
        working-directory: tests-chapter5
        env:
          CI: true
          MONGOMS_VERSION: 7.0.14
          MONGOMS_DOWNLOAD_DIR: /tmp/mongodb-binaries
        run: npx playwright test --reporter=list
