name: E2E tests (library)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install library-backend dependencies
        working-directory: library-backend
        run: npm ci

      - name: Install library-frontend dependencies
        working-directory: library-frontend
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: tests-chapter5
        run: npm ci

      # Optimized: Using Microsoft's official, highly stable Playwright action
      - name: Install Playwright Browsers
        uses: microsoft/playwright-actions@v1

      - name: Run Playwright tests
        working-directory: tests-chapter5
        run: npm test
