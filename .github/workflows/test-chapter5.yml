name: E2E tests (library)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    # This pulls down the pre-configured Microsoft environment where everything is pre-installed
    container:
      image: mcr.microsoft.com/playwright:v1.49.0-noble
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install library-backend dependencies
        working-directory: library-backend
        run: npm ci

      - name: Install library-frontend dependencies
        working-directory: library-frontend
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: tests-chapter5
        run: npm ci

      # Notice how the download/install browser step is completely GONE.
      # We jump straight into the test runner execution safely.
      - name: Run Playwright tests
        working-directory: tests-chapter5
        env:
          CI: true
          HOME: /root
        run: npx playwright test --reporter=list
