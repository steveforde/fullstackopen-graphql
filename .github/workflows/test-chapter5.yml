name: E2E tests (library)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install E2E test dependencies
        working-directory: tests-chapter5
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('tests-chapter5/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests-chapter5
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tests-chapter5
        run: npx playwright install-deps chromium

      - name: Install library-backend dependencies
        working-directory: library-backend
        run: npm ci

      - name: Install library-frontend dependencies
        working-directory: library-frontend
        run: npm ci

      - name: Run Playwright tests
        working-directory: tests-chapter5
        env:
          CI: true
        run: npx playwright test --reporter=list
